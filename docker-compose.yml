services:

  # ── FastAPI application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ps-recommender:latest
    container_name: ps-recommender-app
    ports:
      - "8000:8000"
    environment:
      MOCK_MODE:                "false"
      DEFAULT_HANDLE:           "bogamie"
      LOG_LEVEL:                "INFO"
      APP_ENV:                  "development"
      DATA_DIR:                 "/app/data"

      # !! CHANGE THIS in production — use a 32+ char random secret
      SECRET_KEY:               "CHANGE-THIS-IN-PRODUCTION-use-openssl-rand-hex-32"
      JWT_EXPIRE_DAYS:          "7"

      REDIS_URL:                "redis://redis:6379/0"
      TIER_GAP_MIN:             "-1"
      TIER_GAP_MAX:             "2"
      DEFAULT_REC_COUNT:        "10"
      INACTIVITY_THRESHOLD_DAYS: "60"

      # ── Auth & CAPTCHA ────────────────────────────────────────────────────────
      AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
      AUTH_REGISTER_MAX_ATTEMPTS:     "15"
      AUTH_LOGIN_MAX_ATTEMPTS:        "30"
      AUTH_LOGIN_MAX_FAILURES:        "5"
      AUTH_ACCOUNT_LOCK_MINUTES:      "15"
      EMAIL_CODE_TTL_MINUTES:         "10"
      
      CAPTCHA_REQUIRED:               "false"
      CAPTCHA_SITE_KEY:               "6LdynpwsAAAAAFZ62AZiz3Hhl33Us1FdCAELSdpq"
      CAPTCHA_SECRET_KEY:             "6LdynpwsAAAAAIbDqHy9XdXCOozt5x7whoS7tW1l"
      CAPTCHA_VERIFY_URL:             "https://www.google.com/recaptcha/api/siteverify"

      # ── Email (Brevo SMTP) ──────────────────────────────────────────────────────
      SMTP_HOST:                      "smtp-relay.brevo.com"
      SMTP_PORT:                      "587"
      SMTP_USERNAME:                  "a66793001@smtp-brevo.com"
      SMTP_PASSWORD:                  "xsmtpsib-e84a674e27caf04e840fd1714d847d62f0bae8ef0ca51dd799521735e488db7f-08x66UwQ7kBmS5Iw"
      SMTP_FROM_EMAIL:                "bogamie02@gmail.com"
      SMTP_FROM_NAME:                 "Baekjoon Recommender"
      SMTP_USE_TLS:                   "true"

      # ── Recommendation Engine ──────────────────────────────────────────────────
      WEIGHT_DIFFICULTY:              "0.35"
      WEIGHT_WEAKNESS:                "0.30"
      WEIGHT_TAG_PRIORITY:            "0.20"
      WEIGHT_EXPLORATION:             "0.15"
      CACHE_TTL_SECONDS:              "300"

    volumes:
      # Persist SQLite database across container restarts
      - ps-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Optional Redis cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ps-recommender-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ps-data:
    driver: local
